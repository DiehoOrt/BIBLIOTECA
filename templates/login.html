{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("{% static 'img/fondoUnicaes.png' %}");
            background-size: cover;
            background-position: center;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.93);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto -50px;
            position: relative;
            z-index: 1;
        }
        .logo-wrapper img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
    </style>
    
</head>
<body>
    <div class="text-center">
        <!-- Logo flotando sobre la tarjeta -->
        <div class="logo-wrapper">
            <img src="{% static 'img/UNICAES_Logo.png' %}" alt="Logo">
        </div>

        <div class="login-card p-4 pt-5 mt-0">
            <h5 class="fw-bold mb-1">Bienvenido</h5>
            <p class="text-muted small mb-4">Sistema de Gestión de Biblioteca</p>

            {% if form.errors %}
            <div class="alert alert-danger py-2 text-start small">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0"
                               placeholder="Usuario" autofocus required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0"
                               placeholder="Contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-danger w-100 fw-semibold">
                    Iniciar sesión
                </button>
            </form>
        </div>
    </div>
</body>
</html>
